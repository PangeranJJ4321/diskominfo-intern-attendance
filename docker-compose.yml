services:
  postgres:
    image: postgres:16-alpine
    container_name: diskominfo-attendance-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: diskominfo
      POSTGRES_PASSWORD: diskominfo123
      POSTGRES_DB: diskominfo_attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: